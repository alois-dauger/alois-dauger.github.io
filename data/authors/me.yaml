role: PhD Student in Mathematical Biology

bio: |
  PhD Student in applied mathematics to biology at Sorbonne University (Paris, France). I conduct my research under the supervision of Hedi Soula and Chloé Audebert, within the Jacques-Louis Lions Laboratory and the Nutriomics laboratory. My work focuses on the development of mathematical models to describe the size distribution of adipocytes as well as their population dynamics, with a quantitative and integrative approach to biological phenomena. I am particularly interested in the biological interpretation of mathematical models and aim to contribute to the advancement of collective and public knowledge in this field.

