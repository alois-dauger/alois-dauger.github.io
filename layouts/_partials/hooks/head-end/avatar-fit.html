<style>
  /* Display the profile photo in a larger, rectangular frame using source ratio */
  .resume-biography .avatar-wrapper {
    width: clamp(190px, 26vw, 255px) !important;
    height: auto !important;
    aspect-ratio: 995 / 1162;
  }

  .resume-biography .avatar {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover !important;
  }
</style>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    var biography = document.querySelector(".resume-biography");
    if (!biography) return;

    var avatarImg = biography.querySelector(".avatar-wrapper img.avatar");
    if (avatarImg) {
      avatarImg.setAttribute("src", "/media/authors/mao2.jpeg");
      return;
    }

    // If the theme omits the avatar block, inject it before the profile text.
    var leftColumn = biography.querySelector(".md\\:col-span-4");
    var headingBlock = biography.querySelector(".md\\:col-span-4 .space-y-3");
    if (!leftColumn || !headingBlock) return;

    var wrapper = document.createElement("div");
    wrapper.className = "avatar-wrapper mb-4";

    var img = document.createElement("img");
    img.className = "avatar rounded-lg border-4 border-white shadow-2xl";
    img.src = "/media/authors/mao2.jpeg";
    img.alt = "Alois Dauger";

    wrapper.appendChild(img);
    leftColumn.insertBefore(wrapper, headingBlock);
  });
</script>
