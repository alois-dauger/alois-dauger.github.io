<style>
  /* Display the profile photo in a larger, rectangular frame using source ratio */
  .resume-biography .avatar-wrapper {
    width: clamp(190px, 26vw, 255px) !important;
    height: auto !important;
    aspect-ratio: 995 / 1162;
  }

  .resume-biography .avatar {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover !important;
  }
</style>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    var avatar = document.querySelector(".resume-biography .avatar-wrapper img.avatar");
    if (!avatar) return;

    avatar.setAttribute("src", "/media/authors/me-portrait.jpeg");
    avatar.removeAttribute("srcset");
    avatar.removeAttribute("sizes");
    avatar.removeAttribute("width");
    avatar.removeAttribute("height");
  });
</script>
